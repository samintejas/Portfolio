<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Samin Tejas</title>
    <link href="css/style.css" rel="stylesheet" />
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css"
    />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"
    ></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
      onload="renderMathInElement(document.body, {delimiters: [{left: '$$', right: '$$', display: true}, {left: '$', right: '$', display: false}]});"
    ></script>
  </head>

  <body class="flex flex-col h-screen max-w-3xl mx-auto p-4">
    <section
      class="flex items-center justify-between p-2 pb-6 border-b border-gray-400"
    >
      <h1>Samin Tejas</h1>

      <button id="theme-toggle">
        <svg
          class="w-6 h-6"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 472 472"
        >
          <path
            fill="currentColor"
            d="m123 95l-30 30l-39-38l30-30zM64 216v43H0v-43h64zM256 4v63h-43V4h43zm159 83l-38 38l-30-30l38-38zm-69 292l30-29l39 38l-30 30zm59-163h64v43h-64v-43zM235 109q53 0 90.5 37.5T363 237t-37.5 90.5T235 365t-90.5-37.5T107 237t37.5-90.5T235 109zm-22 362v-63h43v63h-43zM54 388l39-39l30 30l-39 39z"
          />
        </svg>
      </button>
    </section>

    <nav
      class="flex items-start gap-6 p-2 border-b border-gray-400 text-blue-600"
    >
      <a
        href="/"
        hx-get="/"
        hx-target="#content"
        hx-swap="innerHTML transition:true"
        hx-push-url="true"
        >About</a
      >
      <a
        href="/blog"
        hx-get="/blog"
        hx-target="#content"
        hx-swap="innerHTML transition:true"
        hx-push-url="true"
        >Blog</a
      >
      <a
        href="/sounds"
        hx-get="/sounds"
        hx-target="#content"
        hx-swap="innerHTML transition:true"
        hx-push-url="true"
        >Sounds</a
      >
      <a
        href="/lab"
        hx-get="/lab"
        hx-target="#content"
        hx-swap="innerHTML transition:true"
        hx-push-url="true"
        >Lab</a
      >
    </nav>

    <div class="flex flex-1 overflow-hidden">
      <main
        class="w-full overflow-y-auto p-4 pt-10"
        id="content"
        style="view-transition-name: content"
      >
        {{content}}
      </main>
    </div>

    <section class="flex items-center justify-between gap-4 p-4">
      <div class="text-white">
        <svg
          class="w-6 h-6"

        </svg>
      </div>

        <a

          class="text-gray-800 hover:text-[#FF0000] transition-colors"

          </svg>
        </a>

        <a
          href="https://www.linkedin.com/in/samin-tejas/"
          target="_blank"
          class="text-gray-800 hover:text-blue-400 transition-colors"
        >
          <svg
            class="w-5 h-5"
            role="img"
            viewBox="0 0 128 128"
            xmlns="http://www.w3.org/2000/svg"
          >
            <title>LinkedIn</title>

        >

    </section>
    <script>
      document.body.addEventListener("htmx:afterSwap", function (e) {
        if (typeof renderMathInElement === "function") {
          renderMathInElement(e.detail.target, {
            delimiters: [
              { left: "$$", right: "$$", display: true },
              { left: "$", right: "$", display: false },
            ],
          });
        }
      });
    </script>
  </body>
</html>
