    <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
    <script>
      function initKatex() {
        var inlines = document.querySelectorAll(
          ".math-inline:not(.math-rendered)",
        );
        var displays = document.querySelectorAll(
          ".math-display:not(.math-rendered)",
        );
        if (!inlines.length && !displays.length) return;

        function render() {
          inlines.forEach(function (el) {
            el.innerHTML = katex.renderToString(el.textContent, {
              displayMode: false,
              throwOnError: false,
            });
            el.classList.add("math-rendered");
          });
          displays.forEach(function (el) {
            el.innerHTML = katex.renderToString(el.textContent, {
              displayMode: true,
              throwOnError: false,
            });
            el.classList.add("math-rendered");
          });
        }

        if (window.katex) {
          render();
          return;
        }

        if (!document.querySelector("link[data-katex]")) {
          var l = document.createElement("link");
          l.rel = "stylesheet";
          l.href = "https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.css";
          l.setAttribute("data-katex", "");
          document.head.appendChild(l);
        }

        var s = document.createElement("script");
        s.src = "https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.js";
        s.onload = render;
        document.head.appendChild(s);
      }

      document.addEventListener("DOMContentLoaded", initKatex);
      document.addEventListener("htmx:afterSwap", initKatex);
    </script>
